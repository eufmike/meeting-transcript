[workspace]
name = "meeting-transcript"
version = "0.1.0"
description = "Meeting transcript processor with speaker identification"
authors = ["Mike Shih"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = ">=3.11"
pytorch = ">=2.1"
torchaudio = ">=2.1"

[pypi-dependencies]
meeting-transcript = { path = ".", editable = true }
pydantic = ">=2.0"
typer = ">=0.12"
rich = ">=13.0"
# audio pipeline
openai-whisper = ">=20231117"
pyannote-audio = ">=3.1.0"
sounddevice = ">=0.4.6"
soundfile = ">=0.12.1"
pydub = ">=0.25.1"
opencc-python-reimplemented = ">=0.1.7"
# LLM analysis
google-genai = ">=1.0"
anthropic = ">=0.39.0"
# utils
scipy = ">=1.11.0"
numpy = ">=1.24.0"
pyyaml = ">=6.0"

[feature.dev.pypi-dependencies]
pytest = ">=8.0"
pytest-cov = ">=5.0"
ruff = ">=0.4"
mypy = ">=1.10"
pre-commit = ">=3.7"
detect-secrets = ">=1.5"

[environments]
default = { solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
lint = "ruff check src tests"
format = "ruff format src tests"
typecheck = "mypy src"
test = "pytest tests/ -v"
update-baseline = "detect-secrets scan --exclude-files 'pixi\\.lock' > .secrets.baseline"
run = "meeting-transcript"
record = "meeting-transcript record"
process = "meeting-transcript process"
analyze = "meeting-transcript analyze"
